    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 20px;
        }
        /* Glassmorphism Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px; /* Reduced slightly for better mobile fit */
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            animation: fadeIn 1.5s ease-in-out;
            overflow: hidden; /* Keeps everything inside the rounded corners */
        }

        /* --- ADDED IMAGE FIX HERE --- */
        .glass-card img {
            max-width: 100%;
            height: auto;
            border-radius: 15px;
            margin-bottom: 20px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        .subtitle {
            color: #00d2ff;
            font-weight: bold;
            margin-bottom: 20px;
            display: block;
        }
        p {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #e0e0e0;
            margin-bottom: 25px;
        }
        .social-links {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            text-decoration: none;
            color: white;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            font-size: 0.85rem;
            transition: 0.3s all ease;
            height: 45px;
        }
        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
        }
        .btn svg {
            width: 18px;
            height: 18px;
            margin-right: 8px;
        }
        .btn-full {
            grid-column: span 2;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            font-weight: bold;
        }
        @media (max-width: 480px) {
            .social-links { grid-template-columns: 1fr; }
            .btn-full { grid-column: span 1; }
        }
    </style>
